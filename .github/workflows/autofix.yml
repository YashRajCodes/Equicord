name: autofix.ci

on:
    pull_request:

permissions:
    contents: read

jobs:
    autofix:
        name: autofix
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run lint fix
              run: bun run lint:fix

            - name: Run Oxfmt
              run: |
                  files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.json' '*.jsonc' '*.css' '*.scss' '*.md' '*.yml' '*.yaml')
                  if [ -n "$files" ]; then
                    bunx oxfmt --write $files
                  fi

            - name: Run stylelint fix
              run: bun run lint-styles:fix

            - uses: autofix-ci/action@v1
